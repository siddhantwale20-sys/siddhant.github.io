<!DOCTYPE html>
<html>
<head>
    <title>Fitness & Diet Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Fitness & Diet Planner</h1>
</header>

<section class="bmi">
    <h2>BMI Calculator</h2>
    <input type="number" id="weight" placeholder="Weight (kg)">
    <input type="number" id="height" placeholder="Height (cm)">
    <button onclick="calculateBMI()">Calculate</button>
    <p id="result"></p>
</section>

<section class="workout">
    <h2>Workout Plan</h2>
    <ul>
        <li>Push-ups - 15 reps</li>
        <li>Squats - 20 reps</li>
        <li>Running - 10 minutes</li>
    </ul>
</section>

<section class="diet">
    <h2>Diet Tips</h2>
    <ul>
        <li>Eat more protein</li>
        <li>Drink 2-3 liters of water</li>
        <li>Avoid junk food</li>
    </ul>
</section>

<script src="script.js"></script>

</body>
</html>
